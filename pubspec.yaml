name: smart_dairy_app
description: Smart Dairy Management System - Flutter App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0

  # State Management
  provider: ^6.1.1

  # HTTP Client
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4

  # Icons
  cupertino_icons: ^1.0.6

  # Date formatting
  intl: ^0.19.0

  # Image Picker
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
